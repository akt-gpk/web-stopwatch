<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #0f0c29;
    --bg2: #302b63;
    --bg3: #24243e;
    --accent: #a78bfa;
    --accent2: #60a5fa;
    --green: #34d399;
    --red: #f87171;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --text: #f1f5f9;
    --muted: rgba(241,245,249,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    user-select: none;
    overflow: hidden;
  }

  /* floating orbs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 500px; height: 500px;
    background: var(--accent);
    top: -120px; left: -120px;
  }
  body::after {
    width: 400px; height: 400px;
    background: var(--accent2);
    bottom: -100px; right: -80px;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 420px;
  }

  /* header */
  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header h1 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ring + time */
  .ring-wrap {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 0 auto 32px;
  }

  .ring-svg {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .ring-bg {
    fill: none;
    stroke: var(--glass-border);
    stroke-width: 4;
  }

  .ring-progress {
    fill: none;
    stroke: url(#ringGrad);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 722;
    stroke-dashoffset: 722;
    transition: stroke-dashoffset 0.08s linear;
  }

  .time-box {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  #display {
    font-size: 58px;
    font-weight: 800;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #ms {
    font-size: 22px;
    font-weight: 500;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.06em;
  }

  /* card */
  .card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 32px 28px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 24px 64px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  /* buttons */
  .buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  button {
    flex: 1;
    padding: 14px 10px;
    border: none;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }

  button:active { transform: scale(0.95); }

  #startBtn {
    flex: 2;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 4px 20px rgba(167,139,250,0.4);
  }

  #startBtn:hover { box-shadow: 0 6px 28px rgba(167,139,250,0.55); filter: brightness(1.08); }
  #startBtn.running {
    background: linear-gradient(135deg, #f87171, #fb923c);
    box-shadow: 0 4px 20px rgba(248,113,113,0.4);
  }
  #startBtn.running:hover { box-shadow: 0 6px 28px rgba(248,113,113,0.55); }

  #lapBtn, #resetBtn {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--muted);
  }

  #lapBtn:hover:not(:disabled), #resetBtn:hover {
    background: rgba(255,255,255,0.1);
    color: var(--text);
  }

  #lapBtn:disabled { opacity: 0.25; cursor: default; }

  /* laps */
  .laps-header {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 4px 10px;
    border-bottom: 1px solid var(--glass-border);
    margin-bottom: 4px;
  }

  #laps {
    max-height: 200px;
    overflow-y: auto;
  }

  #laps:empty::after {
    content: '— ラップなし —';
    display: block;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 20px 0;
    letter-spacing: 0.05em;
  }

  .lap-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13px;
    animation: slideIn 0.18s ease;
  }

  .lap-item:last-child { border-bottom: none; }

  .lap-num  { color: var(--muted); font-weight: 500; min-width: 52px; }
  .lap-split { font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); }
  .lap-total { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }

  .lap-item.best  .lap-split { color: var(--green); }
  .lap-item.worst .lap-split { color: var(--red); }

  .badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 99px;
    letter-spacing: 0.05em;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge.best  { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge.worst { background: rgba(248,113,113,0.15); color: var(--red); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  #laps::-webkit-scrollbar { width: 3px; }
  #laps::-webkit-scrollbar-track { background: transparent; }
  #laps::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }
</style>
</head>
<body>

<div class="container">
  <div class="header"><h1>Stopwatch</h1></div>

  <div class="card">
    <!-- ring -->
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 260 260">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#60a5fa"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg"       cx="130" cy="130" r="115"/>
        <circle class="ring-progress" cx="130" cy="130" r="115" id="ringEl"/>
      </svg>
      <div class="time-box">
        <div id="display">00:00</div>
        <div id="ms">.00</div>
      </div>
    </div>

    <!-- buttons -->
    <div class="buttons">
      <button id="lapBtn" disabled>ラップ</button>
      <button id="startBtn">スタート</button>
      <button id="resetBtn">リセット</button>
    </div>

    <!-- laps -->
    <div class="laps-header">
      <span>Lap</span><span>スプリット</span><span>合計</span>
    </div>
    <div id="laps"></div>
  </div>
</div>

<script>
  const displayEl = document.getElementById('display');
  const msEl      = document.getElementById('ms');
  const startBtn  = document.getElementById('startBtn');
  const lapBtn    = document.getElementById('lapBtn');
  const resetBtn  = document.getElementById('resetBtn');
  const lapsEl    = document.getElementById('laps');
  const ringEl    = document.getElementById('ringEl');

  const CIRCUMFERENCE = 2 * Math.PI * 115; // ~722.6
  ringEl.style.strokeDasharray = CIRCUMFERENCE;
  ringEl.style.strokeDashoffset = CIRCUMFERENCE;

  let running   = false;
  let startTime = 0;
  let elapsed   = 0;
  let lapStart  = 0;
  let laps      = [];
  let raf       = null;
  let ringCycle = 60000; // 1分 = 1周

  function format(ms) {
    const totalSec = Math.floor(ms / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    return `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function formatMs(ms) {
    return '.' + String(Math.floor((ms % 1000) / 10)).padStart(2,'0');
  }

  function updateRing(ms) {
    const progress = (ms % ringCycle) / ringCycle;
    ringEl.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
    // extend cycle after 1 min
    if (ms >= 60000) ringCycle = 600000;
  }

  function tick() {
    const now = elapsed + (performance.now() - startTime);
    displayEl.textContent = format(now);
    msEl.textContent = formatMs(now);
    updateRing(now);
    raf = requestAnimationFrame(tick);
  }

  startBtn.addEventListener('click', () => {
    if (!running) {
      running = true;
      startTime = performance.now();
      lapBtn.disabled = false;
      startBtn.textContent = 'ストップ';
      startBtn.classList.add('running');
      raf = requestAnimationFrame(tick);
    } else {
      running = false;
      elapsed += performance.now() - startTime;
      cancelAnimationFrame(raf);
      startBtn.textContent = 'スタート';
      startBtn.classList.remove('running');
    }
  });

  lapBtn.addEventListener('click', () => {
    if (!running) return;
    const now = elapsed + (performance.now() - startTime);
    const split = now - lapStart;
    laps.unshift({ split, total: now });
    lapStart = now;
    renderLaps();
  });

  resetBtn.addEventListener('click', () => {
    running = false;
    cancelAnimationFrame(raf);
    elapsed = 0; lapStart = 0; laps = [];
    ringCycle = 60000;
    displayEl.textContent = '00:00';
    msEl.textContent = '.00';
    ringEl.style.strokeDashoffset = CIRCUMFERENCE;
    startBtn.textContent = 'スタート';
    startBtn.classList.remove('running');
    lapBtn.disabled = true;
    lapsEl.innerHTML = '';
  });

  function renderLaps() {
    const splits = laps.map(l => l.split);
    const best  = laps.length >= 2 ? Math.min(...splits) : -1;
    const worst = laps.length >= 2 ? Math.max(...splits) : -1;
    lapsEl.innerHTML = '';
    laps.forEach((l, i) => {
      const num = laps.length - i;
      const isBest  = laps.length >= 2 && l.split === best;
      const isWorst = laps.length >= 2 && l.split === worst;
      const div = document.createElement('div');
      div.className = 'lap-item' + (isBest ? ' best' : isWorst ? ' worst' : '');
      div.innerHTML = `
        <span class="lap-num">Lap ${String(num).padStart(2,'0')}</span>
        <span class="lap-split">
          ${format(l.split)}<span style="font-weight:400;opacity:.5">${formatMs(l.split)}</span>
          ${isBest ? '<span class="badge best">BEST</span>' : isWorst ? '<span class="badge worst">SLOW</span>' : ''}
        </span>
        <span class="lap-total">${format(l.total)}${formatMs(l.total)}</span>
      `;
      lapsEl.appendChild(div);
    });
  }
</script>
</body>
</html>
